# ══════════════════════════════════════════════════════════════════
#  CLOUD COMPUTING LLJ — docker-compose.yml
#  Stack: Kafka (KRaft) · MongoDB · PostgreSQL · MinIO
#  Kafka: 4.1.1 KRaft mode — NO Zookeeper
#  PySpark: runs locally on host (pip install pyspark), NOT Docker
#  Reason: bitnami/spark pulled all tags from Docker Hub (Sep 2025)
# ══════════════════════════════════════════════════════════════════

services:

  # ────────────────────────────────────────────
  #  KAFKA — KRaft mode (no Zookeeper)
  #  Internal:  kafka:29092  (other containers)
  #  External:  localhost:9092  (host/PySpark)
  # ────────────────────────────────────────────
  kafka:
    image: apache/kafka:4.1.1
    container_name: llj-kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - llj-net
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ────────────────────────────────────────────
  #  KAFKA TOPIC SETUP — one-shot init container
  # ────────────────────────────────────────────
  kafka-setup:
    image: apache/kafka:4.1.1
    container_name: llj-kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo 'Creating Kafka topics...';
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic web-logs       --partitions 3 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic transactions   --partitions 3 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic reviews        --partitions 2 --replication-factor 1;
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic social-media   --partitions 2 --replication-factor 1;
        echo 'Topics created: web-logs / transactions / reviews / social-media';
        exit 0;
      "
    networks:
      - llj-net

  # ────────────────────────────────────────────
  #  KAFKA UI — http://localhost:8080
  # ────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: llj-kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: llj-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - llj-net

  # ────────────────────────────────────────────
  #  MONGODB — http://localhost:8081 (Mongo Express)
  # ────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: llj-mongodb
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodb_data:/data/db
      - ./config/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - llj-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: llj-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - llj-net

  # ────────────────────────────────────────────
  #  POSTGRESQL — http://localhost:5050 (pgAdmin)
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: llj-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - llj-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: llj-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@llj.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    depends_on:
      - postgres
    networks:
      - llj-net

  # ────────────────────────────────────────────
  #  MINIO — Data Lake (S3-compatible)
  #  API: localhost:9000  Console: localhost:9001
  # ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: llj-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - llj-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio-setup:
    image: minio/mc:latest
    container_name: llj-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET_BRONZE};
        mc mb --ignore-existing local/${MINIO_BUCKET_SILVER};
        mc mb --ignore-existing local/${MINIO_BUCKET_GOLD};
        echo 'MinIO buckets ready: bronze / silver / gold';
        exit 0;
      "
    networks:
      - llj-net

volumes:
  kafka_data:
  mongodb_data:
  postgres_data:
  minio_data:

networks:
  llj-net:
    driver: bridge
