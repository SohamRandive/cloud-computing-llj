# spark_jobs/log4j2.properties
# ─────────────────────────────────────────────────────
#  Suppresses noisy WARN/INFO output from Spark jobs.
#  Place in spark_jobs/ — loaded via spark_utils.py
# ─────────────────────────────────────────────────────

rootLogger.level = ERROR
rootLogger.appenderRef.stdout.ref = STDOUT

appender.stdout.type = Console
appender.stdout.name = STDOUT
appender.stdout.layout.type = PatternLayout
appender.stdout.layout.pattern = %d{HH:mm:ss} %-5level %msg%n

# suppress specific noisy loggers
logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = ERROR

logger.spark.name = org.apache.spark
logger.spark.level = ERROR

logger.kafka.name = org.apache.kafka
logger.kafka.level = ERROR

logger.hive.name = org.apache.hive
logger.hive.level = ERROR

logger.parquet.name = org.apache.parquet
logger.parquet.level = ERROR

logger.amazonaws.name = com.amazonaws
logger.amazonaws.level = ERROR

logger.jetty.name = org.eclipse.jetty
logger.jetty.level = ERROR

logger.metrics.name = org.apache.hadoop.metrics2
logger.metrics.level = ERROR
